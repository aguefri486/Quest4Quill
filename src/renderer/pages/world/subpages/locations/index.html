<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ubicaciones</title>
  <link rel="stylesheet" href="../../../../styles/base.css">
  <link rel="stylesheet" href="../shared.css">
  <link rel="stylesheet" href="locations.css">
</head>
<body class="tab-page">
  <main class="tab-page-shell locations-workspace">
    <div class="page-header">
      <div>
        <p class="detail-kicker">Lugares</p>
        <h2 class="page-title" id="worldTitle">Ubicaciones</h2>
        <p class="page-copy">Guarda ubicaciones concretas con un nombre y texto explicativo breve.</p>
      </div>
      <button id="createLocationButton" class="action-button" type="button">Añadir ubicación</button>
    </div>

    <section class="locations-grid" id="locationsGrid" aria-label="Lista de ubicaciones"></section>
  </main>

  <div id="locationModal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-card location-modal-card" role="dialog" aria-modal="true" aria-labelledby="locationModalTitle">
      <div class="modal-header">
        <h3 id="locationModalTitle">Editar ubicación</h3>
        <button id="locationModalClose" class="modal-close" type="button" aria-label="Cerrar ubicación">×</button>
      </div>
      <div class="field">
        <label for="locationNameInput">Nombre</label>
        <input id="locationNameInput" type="text" placeholder="Nombre de la ubicación" />
      </div>
      <div class="field">
        <label for="locationNotesInput">Notas</label>
        <textarea id="locationNotesInput" placeholder="Texto explicativo..."></textarea>
      </div>
      <div class="modal-actions">
        <button id="deleteLocationButton" class="danger-button" type="button">Eliminar ubicación</button>
        <button id="locationModalCloseSecondary" class="secondary" type="button">Cerrar</button>
      </div>
    </div>
  </div>

  <div id="deleteLocationModal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="deleteLocationModalTitle">
      <div class="modal-header">
        <h3 id="deleteLocationModalTitle">Eliminar ubicación</h3>
      </div>
      <div class="modal-body" id="deleteLocationModalBody"></div>
      <div class="modal-actions">
        <button type="button" class="secondary" id="deleteLocationModalCancel">Cancelar</button>
        <button type="button" class="danger-button" id="deleteLocationModalConfirm">Eliminar</button>
      </div>
    </div>
  </div>

  <script src="locations.js"></script>
</body>
</html>
