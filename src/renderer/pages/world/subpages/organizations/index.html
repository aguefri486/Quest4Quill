<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organizaciones</title>
  <link rel="stylesheet" href="../../../../styles/base.css">
  <link rel="stylesheet" href="../shared.css">
  <link rel="stylesheet" href="organizations.css">
</head>
<body class="tab-page">
  <main class="tab-page-shell organizations-workspace">
    <section id="organizationListView" class="organization-list-view">
      <div class="page-header">
        <div>
          <p class="detail-kicker">Gente</p>
          <h2 class="page-title" id="worldTitle">Organizaciones</h2>
        </div>
      </div>

      <div id="organizationsGrid" class="organizations-grid" aria-label="Lista de organizaciones"></div>
    </section>

    <section id="organizationDetailView" class="organization-detail-view hidden" aria-live="polite"></section>
  </main>

  <div id="deleteOrganizationModal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="deleteOrganizationModalTitle">
      <div class="modal-header">
        <h3 id="deleteOrganizationModalTitle">Eliminar organización</h3>
      </div>
      <div class="modal-body" id="deleteOrganizationModalBody"></div>
      <div class="modal-actions">
        <button type="button" class="secondary" id="deleteOrganizationModalCancel">Cancelar</button>
        <button type="button" class="danger-button" id="deleteOrganizationModalConfirm">Eliminar</button>
      </div>
    </div>
  </div>

  <script src="organizations.js"></script>
</body>
</html>
