<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Objetos</title>
  <link rel="stylesheet" href="../../../../styles/base.css">
  <link rel="stylesheet" href="../shared.css">
  <link rel="stylesheet" href="items.css">
</head>
<body class="tab-page">
  <main class="tab-page-shell items-workspace">
    <section id="itemListView" class="item-list-view">
      <div class="page-header">
        <div>
          <p class="detail-kicker">Objetos</p>
          <h2 class="page-title" id="worldTitle">Objetos</h2>
        </div>
        <div class="page-header-actions">
          <button id="createItemButton" class="action-button" type="button">Añadir objeto</button>
        </div>
      </div>

      <div id="itemsGrid" class="items-grid" aria-label="Lista de objetos"></div>
    </section>

    <section id="itemDetailView" class="item-detail-view hidden" aria-live="polite"></section>
  </main>

  <div id="deleteItemModal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="deleteItemModalTitle">
      <div class="modal-header">
        <h3 id="deleteItemModalTitle">Eliminar objeto</h3>
      </div>
      <div class="modal-body" id="deleteItemModalBody"></div>
      <div class="modal-actions">
        <button type="button" class="secondary" id="deleteItemModalCancel">Cancelar</button>
        <button type="button" class="danger-button" id="deleteItemModalConfirm">Eliminar</button>
      </div>
    </div>
  </div>

  <script src="items.js"></script>
</body>
</html>
