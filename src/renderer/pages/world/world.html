<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quest4Quill · Mundo</title>
  <link rel="stylesheet" href="../../styles/base.css">
  <link rel="stylesheet" href="../../styles/world.css">
</head>
<body>
  <div class="world-page">
    <aside class="world-sidebar">
      <div class="world-sidebar-shell">
        <div class="world-sidebar-header">
          <div class="world-sidebar-heading">
            <p class="sidebar-kicker">MUNDO</p>
            <h1 id="worldName" class="world-sidebar-title">Mundo</h1>
          </div>
          <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-expanded="true" aria-label="Plegar barra lateral">‹</button>
        </div>

        <nav class="sidebar-nav" aria-label="Secciones del mundo">
          <div class="sidebar-group">
            <p class="sidebar-group-label">GENERAL</p>
            <button class="sidebar-tab active" type="button" data-tab="stories">Historias</button>
            <button class="sidebar-tab" type="button" data-tab="notes">Notas</button>
          </div>

          <div class="sidebar-group">
            <p class="sidebar-group-label">GENTE</p>
            <button class="sidebar-tab" type="button" data-tab="characters">Personajes</button>
            <button class="sidebar-tab" type="button" data-tab="organizations">Organizaciones</button>
          </div>

          <div class="sidebar-group">
            <p class="sidebar-group-label">LUGARES</p>
            <button class="sidebar-tab" type="button" data-tab="regions">Regiones</button>
            <button class="sidebar-tab" type="button" data-tab="locations">Ubicaciones</button>
          </div>

          <div class="sidebar-group">
            <p class="sidebar-group-label">COSAS</p>
            <button class="sidebar-tab" type="button" data-tab="items">Objetos</button>
          </div>
        </nav>

        <button id="backButton" class="back-link" type="button">← Volver a mundos</button>
      </div>
    </aside>

    <main class="world-content">
      <button
        id="sidebarCompactToggle"
        class="sidebar-compact-toggle"
        type="button"
        aria-expanded="false"
        aria-label="Plegar barra lateral"
      >
        ☰
      </button>
      <div id="sidebarBackdrop" class="sidebar-backdrop hidden" aria-hidden="true"></div>
      <iframe
        id="worldFrame"
        class="world-frame"
        title="Contenido del mundo"
        src="about:blank"
      ></iframe>
    </main>
  </div>

  <script src="world.js"></script>
</body>
</html>
